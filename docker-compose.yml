services:

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: comercial
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - minha-rede

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - minha-rede

  backend:
    build: ./Back/KraftWorks
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/comercial
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - minha-rede
    env_file:
      - .env

  frontend:
    build: ./Front
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - minha-rede

volumes:
  postgres-data:

networks:
  minha-rede: